<!DOCTYPE html>

<style>
  /* IBM Plex Mono엔 한글 글리프가 없으므로, 이 폰트는 숫자·쉼표 등 라틴 문자에만 적용할 것.
     한글이 섞인 문자열에 적용하면 브라우저가 시스템 기본 한글 폰트로 조용히 대체된다. */

<body class="pb-16">

<!-- 필터바 -->

<!-- 새 소분 등록 모달 -->
<div id="formModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background: rgba(32,40,31,0.45)">

<!-- ================= Firebase 연동 =================
  1) https://console.firebase.google.com 에서 무료 프로젝트 생성
  2) Firestore Database 생성 (테스트 모드로 시작 — 30일 후 규칙 다시 설정 필요)
  3) 프로젝트 설정 > 일반 > 웹 앱 추가 후 아래 firebaseConfig를 발급받은 값으로 교체
================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, doc, runTransaction,
  updateDoc, increment, query, orderBy, getDocs, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDmMnZeSK9k6RMfU0uIRDQ8Hbj-HLhYL8",
  authDomain: "sobunhae.firebaseapp.com",
  projectId: "sobunhae",
  storageBucket: "sobunhae.firebasestorage.app",
  messagingSenderId: "1076905142580",
  appId: "1:1076905142580:web:2ae1f34f7f822b32435d61",
};

const TAGS = ["신선/냉동", "간식/과자", "생활용품", "유아/키즈", "건강/영양", "반려동물", "주방/가전", "기타"];
const won = (n) => `${Math.round(n).toLocaleString("ko-KR")}원`;
const wonNum = (n) => Math.round(n).toLocaleString("ko-KR");
const daysSince = (ts) => Math.floor((Date.now() - (ts?.toMillis?.() ?? ts ?? Date.now())) / 86400000);
const el = (sel) => document.querySelector(sel);

let app, db, deals = [];
let firebaseReady = false;
let statusFilter = "all", tagFilter = "all", joinedIds = new Set();
let selectedTags = [];
let currentView = "list";
let formLocation = null; // { name, lat, lng }

let kakaoReady = false;
let formMap, formMarker, formGeocoder;
let feedMap, feedMarkers = [];

if (window.kakao && window.kakao.maps) {
  window.kakao.maps.load(() => { kakaoReady = true; });
} else {
  console.warn("카카오맵 SDK를 불러오지 못했어요. KAKAO_APP_KEY와 도메인 등록을 확인해주세요.");
}

try {
  app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  firebaseReady = true;
} catch (e) {
  console.error("Firebase 초기화 실패:", e);
}

/* ---------- UI 초기 세팅 ---------- */
el("#statusChips").innerHTML = [
  ["all", "전체"], ["open", "모집중"], ["matched", "모집완료"],
].map(([k, label]) => `<button data-status="${k}" class="status-chip text-xs font-semibold rounded-full px-3 py-1.5 border border-kraft bg-white">${label}</button>`).join("");

el("#tagFilter").innerHTML = `<option value="all">태그 전체</option>` + TAGS.map((t) => `<option value="${t}">#${t}</option>`).join("");

el("#f_tags").innerHTML = TAGS.map((t) =>
  `<button type="button" data-tag="${t}" class="tag-pick text-xs font-semibold px-2.5 py-1 rounded-full border border-kraft">#${t}</button>`
).join("");

function renderStatusChips() {
  document.querySelectorAll(".status-chip").forEach((b) => {
    const on = b.dataset.status === statusFilter;
    b.className = `status-chip text-xs font-semibold rounded-full px-3 py-1.5 border ${on ? "bg-ink text-white border-ink" : "bg-white text-ink border-kraft"}`;
  });
}
renderStatusChips();

document.querySelectorAll(".status-chip").forEach((b) => b.addEventListener("click", () => {
  statusFilter = b.dataset.status; renderStatusChips(); render();
}));
el("#tagFilter").addEventListener("change", (e) => { tagFilter = e.target.value; render(); });
el("#locFilter").addEventListener("input", render);

document.querySelectorAll(".tag-pick").forEach((b) => b.addEventListener("click", () => {
  const t = b.dataset.tag;
  selectedTags = selectedTags.includes(t) ? selectedTags.filter((x) => x !== t) : [...selectedTags, t];
  document.querySelectorAll(".tag-pick").forEach((btn) => {
    const on = selectedTags.includes(btn.dataset.tag);
    btn.className = `tag-pick text-xs font-semibold px-2.5 py-1 rounded-full border ${on ? "bg-accent2 text-white border-accent2" : "bg-white text-ink border-kraft"}`;
  });
}));

el("#openFormBtn").addEventListener("click", () => {
  el("#formModal").classList.remove("hidden"); el("#formModal").classList.add("flex");
  el("#f_locError").classList.add("hidden");
});
el("#closeFormBtn").addEventListener("click", closeForm);
function closeForm() {
  el("#formModal").classList.add("hidden"); el("#formModal").classList.remove("flex");
  el("#formError").classList.add("hidden");
}

function renderViewToggle() {
  document.querySelectorAll(".view-btn").forEach((b) => {
    const on = b.dataset.view === currentView;
    b.className = `view-btn text-xs font-semibold px-3 py-1.5 ${on ? "bg-ink text-white" : "bg-white text-ink"}`;
  });
}
renderViewToggle();
document.querySelectorAll(".view-btn").forEach((b) => b.addEventListener("click", () => {
  currentView = b.dataset.view;
  renderViewToggle();
  render();
}));

/* ---------- 데이터 계층 ---------- */
// location은 { name, lat, lng } 구조. 예전 데이터(순수 문자열)도 있을 수 있어 locOf()로 정규화.
function locOf(d) {
  if (d.location && typeof d.location === "object") return d.location;
  return { name: d.location || "위치 미상", lat: null, lng: null };
}

const SEED = [
  { product: "커클랜드 로티세리 치킨 2팩", store: "코스트코 양재점", totalPrice: 24000, targetCount: 4,
    location: { name: "서초동", lat: 37.4837, lng: 127.0324 }, tags: ["신선/냉동"], meetMethod: "직접 만나서 전달", contactLink: "",
    participants: [{ nickname: "닭좋아" }, { nickname: "치킨러버" }], status: "open",
    createdAt: Date.now() - 2400000, priceCheckedAt: Date.now() - 2400000, priceConfirmations: 1 },
  { product: "커클랜드 냉동 블루베리 2.5kg", store: "코스트코 상봉점", totalPrice: 18900, targetCount: 2,
    location: { name: "중화동", lat: 37.6035, lng: 127.0762 }, tags: ["신선/냉동", "건강/영양"], meetMethod: "택배로 소분 발송", contactLink: "",
    participants: [{ nickname: "베리굿" }, { nickname: "아침스무디" }], status: "matched",
    createdAt: Date.now() - 18000000, priceCheckedAt: Date.now() - 777600000, priceConfirmations: 1 },
];

async function seedIfEmpty() {
  const snap = await getDocs(collection(db, "deals"));
  if (snap.empty) {
    for (const d of SEED) await addDoc(collection(db, "deals"), d);
  }
}

function startListening() {
  const q = query(collection(db, "deals"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    deals = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    render();
  }, (err) => {
    console.error(err);
    el("#feedStatus").textContent = "목록을 불러오지 못했어요. Firebase 설정을 확인해주세요.";
    el("#feedStatus").classList.remove("hidden");
    el("#feed").innerHTML = "";
  });
}

if (firebaseReady) {
  seedIfEmpty().finally(startListening);
} else {
  el("#feedStatus").textContent = "Firebase 설정이 비어 있어요. index.html 안의 firebaseConfig를 채워주세요.";
}

el("#submitFormBtn").addEventListener("click", async () => {
  const product = el("#f_product").value.trim();
  const totalPrice = Number(el("#f_price").value);
  const targetCount = Number(el("#f_target").value);
  const nickname = el("#f_nickname").value.trim();
  const errorEl = el("#formError");

  if (!product || !totalPrice || !formLocation || !nickname) {
    errorEl.textContent = "상품명, 총 가격, 위치(지도에서 검색), 닉네임은 꼭 입력해야 해요.";
    errorEl.classList.remove("hidden"); return;
  }
  if (totalPrice <= 0 || targetCount < 2) {
    errorEl.textContent = "가격은 0보다 커야 하고, 최소 2명부터 모집할 수 있어요.";
    errorEl.classList.remove("hidden"); return;
  }
  errorEl.classList.add("hidden");

  const deal = {
    product, store: el("#f_store").value.trim(), totalPrice, targetCount, location: formLocation,
    tags: selectedTags, meetMethod: el("#f_meet").value, contactLink: el("#f_contact").value.trim(),
    participants: [{ nickname }], status: "open",
    createdAt: Date.now(), priceCheckedAt: Date.now(), priceConfirmations: 1,
  };
  const ref = await addDoc(collection(db, "deals"), deal);
  joinedIds.add(ref.id);
  selectedTags = [];
  formLocation = null;
  el("#f_locSearch").value = "";
  el("#f_locResult").classList.add("hidden");
  el("#f_map").classList.add("hidden");
  document.querySelectorAll(".tag-pick").forEach((b) => b.className = "tag-pick text-xs font-semibold px-2.5 py-1 rounded-full border border-kraft bg-white");
  document.querySelectorAll("#formFields input, #formFields select").forEach((i) => i.value = "");
  closeForm();
});

async function joinDeal(id, nickname) {
  const ref = doc(db, "deals", id);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    const data = snap.data();
    if (data.participants.some((p) => p.nickname === nickname)) return;
    const participants = [...data.participants, { nickname }];
    tx.update(ref, { participants, status: participants.length >= data.targetCount ? "matched" : "open" });
  });
  joinedIds.add(id);
}

async function confirmPrice(id) {
  await updateDoc(doc(db, "deals", id), { priceCheckedAt: Date.now(), priceConfirmations: increment(1) });
}

/* ---------- 위치 검색 & 지도 선택 (등록 폼) ---------- */
function ensureFormMap(lat, lng) {
  const mapEl = el("#f_map");
  mapEl.classList.remove("hidden");
  const center = new kakao.maps.LatLng(lat, lng);
  if (!formMap) {
    formMap = new kakao.maps.Map(mapEl, { center, level: 4 });
    formGeocoder = new kakao.maps.services.Geocoder();
    formMarker = new kakao.maps.Marker({ position: center, map: formMap, draggable: true });
    kakao.maps.event.addListener(formMarker, "dragend", () => {
      const pos = formMarker.getPosition();
      reverseGeocodeToForm(pos.getLat(), pos.getLng());
    });
  } else {
    formMap.relayout();
    formMap.setCenter(center);
    formMarker.setPosition(center);
  }
}

function reverseGeocodeToForm(lat, lng) {
  formGeocoder.coord2Address(lng, lat, (result, status) => {
    let name = `위도 ${lat.toFixed(4)}, 경도 ${lng.toFixed(4)}`;
    if (status === kakao.maps.services.Status.OK && result[0]) {
      const addr = result[0].address;
      name = addr.region_3depth_name || addr.region_2depth_name || addr.address_name;
    }
    formLocation = { name, lat, lng };
    const resultEl = el("#f_locResult");
    resultEl.textContent = `선택된 위치: ${name}`;
    resultEl.classList.remove("hidden");
  });
}

el("#f_locSearchBtn").addEventListener("click", () => {
  const query = el("#f_locSearch").value.trim();
  const errorEl = el("#f_locError");
  if (!query) { errorEl.textContent = "검색할 위치를 입력해주세요."; errorEl.classList.remove("hidden"); return; }
  if (!kakaoReady) { errorEl.textContent = "지도를 아직 불러오는 중이에요. 잠시 후 다시 시도해주세요."; errorEl.classList.remove("hidden"); return; }
  errorEl.classList.add("hidden");

  const geocoder = new kakao.maps.services.Geocoder();
  const places = new kakao.maps.services.Places();
  geocoder.addressSearch(query, (result, status) => {
    if (status === kakao.maps.services.Status.OK && result[0]) {
      applyLocation(result[0].y, result[0].x, result[0].address_name);
    } else {
      // 주소로 못 찾으면 장소명(카페, 매장 등)으로 재검색
      places.keywordSearch(query, (result2, status2) => {
        if (status2 === kakao.maps.services.Status.OK && result2[0]) {
          applyLocation(result2[0].y, result2[0].x, result2[0].place_name);
        } else {
          errorEl.textContent = "위치를 찾지 못했어요. 다른 검색어로 시도해주세요.";
          errorEl.classList.remove("hidden");
        }
      });
    }
  });
});

function applyLocation(lat, lng, name) {
  lat = Number(lat); lng = Number(lng);
  ensureFormMap(lat, lng);
  reverseGeocodeToForm(lat, lng); // 동 단위 이름으로 정규화
}

/* ---------- 피드 지도 뷰 ---------- */
function renderFeedMap(filtered) {
  const mapEl = el("#mapView");
  const withCoords = filtered.filter((d) => locOf(d).lat != null);

  if (!feedMap) {
    feedMap = new kakao.maps.Map(mapEl, {
      center: new kakao.maps.LatLng(37.4200, 127.1265), // 기본: 성남시
      level: 8,
    });
  } else {
    feedMap.relayout();
  }

  feedMarkers.forEach((m) => m.setMap(null));
  feedMarkers = [];

  if (withCoords.length === 0) return;

  const bounds = new kakao.maps.LatLngBounds();
  withCoords.forEach((d) => {
    const loc = locOf(d);
    const pos = new kakao.maps.LatLng(loc.lat, loc.lng);
    const marker = new kakao.maps.Marker({ position: pos, map: feedMap });
    const perPerson = d.totalPrice / d.targetCount;
    const iw = new kakao.maps.InfoWindow({
      content: `<div style="padding:8px 10px;font-size:12px;line-height:1.5;font-family:'IBM Plex Sans KR',sans-serif;min-width:160px;">
        <strong>${d.product}</strong><br/>
        <span style="color:#E8542E;font-weight:700;">${wonNum(perPerson)}원</span> / 1인<br/>
        ${d.status === "matched" ? "모집 완료" : `${d.participants.length}/${d.targetCount}명`} · ${loc.name}
      </div>`,
    });
    kakao.maps.event.addListener(marker, "click", () => iw.open(feedMap, marker));
    feedMarkers.push(marker);
    bounds.extend(pos);
  });
  feedMap.setBounds(bounds);
}

/* ---------- 렌더링 ---------- */
function dealCard(d) {
  const perPerson = d.totalPrice / d.targetCount;
  const filled = d.participants.length;
  const matched = d.status === "matched";
  const full = filled >= d.targetCount;
  const alreadyIn = joinedIds.has(d.id);
  const priceAge = daysSince(d.priceCheckedAt ?? d.createdAt);
  const stale = priceAge >= 7;

  const segs = Array.from({ length: Math.min(d.targetCount, 12) }).map((_, i) =>
    `<div class="division-seg ${i < filled ? `filled ${matched ? "matched" : ""}` : ""}"></div>`
  ).join("");

  const tagChips = (d.tags || []).map((t) =>
    `<span class="text-[10px] px-2 py-0.5 rounded-full border border-kraft text-[#6E6650]">#${t}</span>`).join("");

  const participantChips = d.participants.map((p) =>
    `<span class="text-[11px] px-2 py-0.5 rounded-full bg-bg border border-kraft text-ink">${p.nickname}</span>`).join("");

  const ctaBlock = matched ? `
    <div class="rounded-lg p-3 flex items-start gap-2 bg-[#EEF6F1]">
      <span class="text-accent2 mt-0.5">✓</span>
      <div>
        <p class="text-xs font-semibold text-accent2">인원이 다 모였어요.</p>
        ${d.contactLink
          ? `<a href="${d.contactLink}" target="_blank" rel="noreferrer" class="text-xs underline text-accent2 mt-1 inline-block">채팅방 참여하기</a>`
          : `<p class="text-xs mt-1 text-[#6E6650]">작성자가 곧 연락 방법을 공유할 거예요.</p>`}
      </div>
    </div>` : alreadyIn ? `
    <div class="rounded-lg p-2.5 text-xs font-semibold text-center bg-bg text-accent2">참여 완료 · 남은 자리를 기다리는 중이에요</div>` : `
    <div class="flex flex-col gap-1.5">
      <div class="flex gap-2">
        <input class="join-nick input flex-1" placeholder="닉네임" maxlength="12" data-id="${d.id}" />
        <button class="join-btn rounded-lg px-4 text-sm font-bold text-white bg-accent whitespace-nowrap ${full ? "opacity-50 pointer-events-none" : ""}" data-id="${d.id}">참여하기</button>
      </div>
      <p class="join-error text-xs text-accent hidden" data-id="${d.id}"></p>
    </div>`;

  return `
  <div class="rounded-2xl p-5 flex flex-col gap-3 bg-white border border-kraft shadow-sm ${matched ? "card-stripe-matched" : "card-stripe-open"}">
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0">
        ${d.store ? `<p class="text-[11px] font-semibold mb-1 text-accent2 tracking-wide truncate">${d.store}</p>` : ""}
        <h3 class="text-base font-display font-extrabold leading-snug text-ink">${d.product}</h3>
      </div>
      <span class="text-[11px] font-semibold whitespace-nowrap text-[#6E6650] mt-0.5">${matched ? "모집 완료" : `${filled}/${d.targetCount}명`}</span>
    </div>

    <div class="flex gap-1">${segs}</div>

    <div class="flex items-baseline justify-between gap-2 flex-wrap">
      <div class="flex items-baseline gap-2">
        <span class="text-xl font-extrabold text-accent"><span class="font-mono">${wonNum(perPerson)}</span>원</span>
        <span class="text-xs text-[#8A8064]">/ 1인 · 총 <span class="font-mono">${wonNum(d.totalPrice)}</span>원</span>
      </div>
      <button class="confirm-price-btn text-[11px] ${stale ? "text-accent font-semibold" : "text-[#8A8064]"} underline decoration-dotted" data-id="${d.id}" title="이 가격이 지금도 맞으면 눌러주세요">
        ${priceAge === 0 ? "오늘 확인됨" : `${priceAge}일 전 확인됨`}${stale ? " · 확인 필요" : ""}
      </button>
    </div>

    <div class="flex items-center gap-3 text-xs text-[#6E6650]">
      <span>📍 ${locOf(d).name}</span><span>${d.meetMethod}</span>
    </div>

    ${tagChips ? `<div class="flex flex-wrap gap-1">${tagChips}</div>` : ""}
    <div class="flex flex-wrap gap-1.5">${participantChips}</div>

    ${ctaBlock}
  </div>`;
}

function adSlot() {
  return `
  <div class="rounded-xl p-5 flex flex-col items-center justify-center gap-1 min-h-[120px]" style="border:1.5px dashed #B9AE8C; background: repeating-linear-gradient(135deg, #EFE9D8 0px, #EFE9D8 10px, #E7DFC7 10px, #E7DFC7 20px);">
    <span class="ad-sticker text-[10px] font-bold px-2 py-0.5 rounded-full bg-kraft text-ink tracking-wide">스폰서 광고</span>
    <p class="text-xs mt-2 text-[#7A7160]">이 자리에 광고가 표시됩니다</p>
  </div>`;
}

function render() {
  const loc = el("#locFilter").value.trim();
  const filtered = deals
    .filter((d) => (statusFilter === "all" ? true : d.status === statusFilter))
    .filter((d) => (tagFilter === "all" ? true : (d.tags || []).includes(tagFilter)))
    .filter((d) => (loc ? locOf(d).name.includes(loc) : true));

  const statusEl = el("#feedStatus"), feedEl = el("#feed"), mapEl = el("#mapView");

  if (currentView === "map") {
    feedEl.classList.add("hidden");
    mapEl.classList.remove("hidden");
    if (filtered.length === 0) {
      statusEl.classList.remove("hidden");
      statusEl.innerHTML = `<p class="text-sm text-[#8A8064]">조건에 맞는 소분이 없어요.</p>`;
      return;
    }
    statusEl.classList.add("hidden");
    if (!kakaoReady) {
      mapEl.innerHTML = `<div class="flex items-center justify-center h-full text-sm text-[#8A8064]">지도를 불러오는 중이거나, KAKAO_APP_KEY 설정이 필요해요.</div>`;
      return;
    }
    renderFeedMap(filtered);
    return;
  }

  feedEl.classList.remove("hidden");
  mapEl.classList.add("hidden");

  if (filtered.length === 0) {
    feedEl.innerHTML = "";
    statusEl.classList.remove("hidden");
    statusEl.innerHTML = deals.length === 0
      ? `<p class="text-sm font-semibold text-ink">아직 등록된 소분이 없어요.</p><p class="text-xs mt-1 text-[#8A8064]">첫 소분을 올려보세요.</p>`
      : `<p class="text-sm text-[#8A8064]">조건에 맞는 소분이 없어요.</p>`;
    return;
  }
  statusEl.classList.add("hidden");
  feedEl.innerHTML = filtered.map((d, i) => dealCard(d) + ((i + 1) % 3 === 0 ? adSlot() : "")).join("");

  feedEl.querySelectorAll(".join-btn").forEach((btn) => btn.addEventListener("click", async () => {
    const id = btn.dataset.id;
    const input = feedEl.querySelector(`.join-nick[data-id="${id}"]`);
    const errorP = feedEl.querySelector(`.join-error[data-id="${id}"]`);
    const nickname = input.value.trim();
    if (!nickname) { errorP.textContent = "닉네임을 입력해야 참여할 수 있어요."; errorP.classList.remove("hidden"); return; }
    btn.textContent = "참여 중..."; btn.disabled = true;
    await joinDeal(id, nickname);
  }));
  feedEl.querySelectorAll(".confirm-price-btn").forEach((btn) => btn.addEventListener("click", () => confirmPrice(btn.dataset.id)));
}
</script>
