<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>소분해 · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@800;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #F6F3EA; color: #20281F;
    font-family: 'IBM Plex Sans KR', -apple-system, sans-serif;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  header { background: #20281F; color: #fff; padding: 20px 24px; }
  header h1 { font-family: 'Gothic A1', sans-serif; font-weight: 900; font-size: 22px; margin: 0; }
  header p { margin: 4px 0 0; font-size: 12px; color: rgba(255,255,255,.6); }
  main { max-width: 900px; margin: 0 auto; padding: 20px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  select, input[type=text] { border: 1.5px solid #D8CFB2; border-radius: 8px; padding: 6px 10px; font-size: 13px; background: #fff; }
  .row {
    background: #fff; border: 1.5px solid #D8CFB2; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px;
  }
  .row.flagged { border-left: 5px solid #E8542E; }
  .row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .row-title { font-weight: 800; font-size: 15px; }
  .row-meta { font-size: 11px; color: #8A8064; margin-top: 2px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid #D8CFB2; }
  .badge.warn { background: #E8542E; color: #fff; border-color: #E8542E; }
  .badge.ok { background: #2F6F5E; color: #fff; border-color: #2F6F5E; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  button {
    font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    border-radius: 8px; padding: 6px 12px; border: 1.5px solid #D8CFB2; background: #fff; color: #20281F;
  }
  button.danger { background: #E8542E; color: #fff; border-color: #E8542E; }
  button.ghost { background: transparent; }
  #lockScreen {
    position: fixed; inset: 0; background: #20281F; color: #fff;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #lockScreen input { padding: 10px 14px; border-radius: 8px; border: none; font-size: 14px; width: 220px; }
  #lockScreen button { padding: 10px 20px; }
  #emptyMsg { text-align: center; color: #8A8064; padding: 40px 0; }
</style>
</head>
<body>

<div id="lockScreen">
  <p style="font-family:'Gothic A1',sans-serif; font-weight:900; font-size:20px; margin:0;">소분해 관리자</p>
  <input id="pwInput" type="password" placeholder="비밀번호" />
  <button id="pwSubmit">입장</button>
  <p id="pwError" style="color:#E8542E; font-size:12px; display:none;">비밀번호가 틀렸어요.</p>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>소분해 · 관리자</h1>
    <p>신고 누적, 상태 관리, 삭제 — 이 페이지 주소는 외부에 공유하지 마세요.</p>
  </header>
  <main>
    <div class="toolbar">
      <select id="sortSelect">
        <option value="reports">신고 많은 순</option>
        <option value="recent">최신 등록순</option>
      </select>
      <select id="statusFilterSelect">
        <option value="all">전체 상태</option>
        <option value="open">모집중</option>
        <option value="matched">모집완료</option>
        <option value="completed">거래완료</option>
      </select>
      <span id="countLabel" class="mono" style="font-size:12px; color:#8A8064; margin-left:auto;"></span>
    </div>
    <div id="list"></div>
    <p id="emptyMsg" style="display:none;">등록된 소분이 없어요.</p>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 비밀번호를 반드시 바꿔주세요. 이건 실제 보안이 아니라 최소한의 접근 차단입니다.
const ADMIN_PASSWORD = "sobunhae2026";

const firebaseConfig = {
  apiKey: "AIzaSyBDmMnZeSK9k6RMfU0uIRDQ8Hbj-HLhYL8",
  authDomain: "sobunhae.firebaseapp.com",
  projectId: "sobunhae",
  storageBucket: "sobunhae.firebasestorage.app",
  messagingSenderId: "1076905142580",
  appId: "1:1076905142580:web:2ae1f34f7f822b32435d61",
};

const el = (s) => document.querySelector(s);
let deals = [];
let sortMode = "reports";
let statusFilter = "all";

function checkPassword() {
  const val = el("#pwInput").value;
  if (val === ADMIN_PASSWORD) {
    el("#lockScreen").style.display = "none";
    el("#app").style.display = "block";
    initFirebase();
  } else {
    el("#pwError").style.display = "block";
  }
}
el("#pwSubmit").addEventListener("click", checkPassword);
el("#pwInput").addEventListener("keydown", (e) => { if (e.key === "Enter") checkPassword(); });

let db;
function initFirebase() {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  const q = query(collection(db, "deals"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    deals = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    render();
  }, (err) => {
    el("#list").innerHTML = `<p style="color:#E8542E;">불러오기 실패: ${err.message}</p>`;
  });
}

el("#sortSelect").addEventListener("change", (e) => { sortMode = e.target.value; render(); });
el("#statusFilterSelect").addEventListener("change", (e) => { statusFilter = e.target.value; render(); });

const statusLabel = { open: "모집중", matched: "모집완료", completed: "거래완료" };

function render() {
  let list = deals.filter((d) => statusFilter === "all" ? true : d.status === statusFilter);
  if (sortMode === "reports") {
    list = list.slice().sort((a, b) => (b.reportCount || 0) - (a.reportCount || 0) || b.createdAt - a.createdAt);
  } else {
    list = list.slice().sort((a, b) => b.createdAt - a.createdAt);
  }

  el("#countLabel").textContent = `총 ${list.length}건`;
  el("#emptyMsg").style.display = list.length === 0 ? "block" : "none";

  el("#list").innerHTML = list.map((d) => {
    const filled = (d.participants || []).reduce((s, p) => s + (p.units || 1), 0);
    const flagged = (d.reportCount || 0) >= 2;
    const location = (d.location && d.location.name) || d.location || "위치 미상";
    return `
    <div class="row ${flagged ? "flagged" : ""}">
      <div class="row-top">
        <div>
          <div class="row-title">${d.product || "(상품명 없음)"}</div>
          <div class="row-meta">${d.store || "매장 미기재"} · ${location} · ${new Date(d.createdAt).toLocaleString("ko-KR")}</div>
        </div>
        <div class="badges">
          ${flagged ? `<span class="badge warn">신고 ${d.reportCount}건</span>` : ""}
          <span class="badge">${statusLabel[d.status] || d.status}</span>
        </div>
      </div>
      <div class="row-meta mono">${filled}/${d.targetCount}명 · 총 ${Number(d.totalPrice || 0).toLocaleString()}원 · 👍${d.reviewGood || 0} 🚩${d.reviewBad || 0}</div>
      <div class="actions">
        <select class="status-select" data-id="${d.id}">
          <option value="open" ${d.status === "open" ? "selected" : ""}>모집중</option>
          <option value="matched" ${d.status === "matched" ? "selected" : ""}>모집완료</option>
          <option value="completed" ${d.status === "completed" ? "selected" : ""}>거래완료</option>
        </select>
        ${d.reportCount ? `<button class="reset-report-btn ghost" data-id="${d.id}">신고 초기화</button>` : ""}
        <button class="delete-btn danger" data-id="${d.id}">삭제</button>
      </div>
    </div>`;
  }).join("");

  document.querySelectorAll(".status-select").forEach((sel) => sel.addEventListener("change", async (e) => {
    await updateDoc(doc(db, "deals", e.target.dataset.id), { status: e.target.value });
  }));
  document.querySelectorAll(".reset-report-btn").forEach((btn) => btn.addEventListener("click", async () => {
    await updateDoc(doc(db, "deals", btn.dataset.id), { reportCount: 0 });
  }));
  document.querySelectorAll(".delete-btn").forEach((btn) => btn.addEventListener("click", async () => {
    if (!confirm("이 글을 완전히 삭제할까요? 되돌릴 수 없어요.")) return;
    await deleteDoc(doc(db, "deals", btn.dataset.id));
  }));
}
</script>
</body>
</html>
